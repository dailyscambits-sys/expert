<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEEKLY GRIND — Exercise Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --card: #161616;
    --border: #222222;
    --accent: #e8ff00;
    --accent2: #ff4d00;
    --text: #f0f0f0;
    --muted: #555555;
    --done: #00c97a;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    padding: 40px 48px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 8vw, 96px);
    line-height: 0.9;
    letter-spacing: -1px;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .header-meta {
    text-align: right;
  }
  .week-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 6px;
  }
  .progress-bar-wrap {
    width: 200px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-left: auto;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 0%;
  }
  .progress-text {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    text-align: right;
  }

  /* MAIN */
  main {
    padding: 40px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* DAY GRID */
  .day-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }

  .day-tab {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    position: relative;
  }
  .day-tab:hover { border-color: var(--accent); color: var(--accent); }
  .day-tab.active { border-color: var(--accent); color: var(--bg); background: var(--accent); }
  .day-tab.completed::after {
    content: '✓';
    position: absolute;
    top: -6px;
    right: -6px;
    width: 14px;
    height: 14px;
    background: var(--done);
    color: #000;
    font-size: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-family: 'DM Sans', sans-serif;
  }

  /* CONTENT LAYOUT */
  .day-content {
    display: none;
    animation: fadeUp 0.35s ease;
  }
  .day-content.active { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* VIDEO CARD */
  .video-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .video-card-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .video-card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
  }
  .video-badge {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border: 1px solid var(--muted);
    color: var(--muted);
    border-radius: 2px;
    text-transform: uppercase;
  }
  .video-badge.has-video { border-color: var(--accent); color: var(--accent); }

  .video-area {
    position: relative;
    background: #0d0d0d;
    min-height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .video-placeholder {
    text-align: center;
    padding: 40px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    height: 100%;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 2px dashed var(--border);
    margin: 16px;
    width: calc(100% - 32px);
    border-radius: 2px;
  }
  .video-placeholder:hover { border-color: var(--accent); }
  .video-placeholder:hover .upload-icon { color: var(--accent); transform: translateY(-4px); }

  .upload-icon {
    font-size: 40px;
    margin-bottom: 12px;
    color: var(--muted);
    transition: all 0.3s;
    display: block;
  }
  .upload-text {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .upload-sub {
    font-size: 12px;
    color: #333;
  }

  video.workout-video {
    width: 100%;
    max-height: 360px;
    display: block;
    background: #000;
  }

  .video-controls {
    padding: 16px 24px;
    display: flex;
    gap: 10px;
    border-top: 1px solid var(--border);
  }
  .btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 18px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    flex: 1;
  }
  .btn:hover { background: var(--surface); border-color: var(--text); }
  .btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .btn.primary:hover { background: #d4e800; }
  .btn.danger { border-color: var(--accent2); color: var(--accent2); }
  .btn.danger:hover { background: var(--accent2); color: #fff; }

  input[type="file"] { display: none; }

  /* EXERCISE CARD */
  .exercise-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .exercise-card-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .exercise-card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
  }

  .add-exercise-form {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .input-field {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-field:focus { border-color: var(--accent); }
  .input-field::placeholder { color: var(--muted); }
  .input-name { flex: 2; min-width: 120px; }
  .input-sets { flex: 1; min-width: 60px; }
  .input-reps { flex: 1; min-width: 60px; }
  .input-weight { flex: 1; min-width: 70px; }

  .exercise-list {
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 340px;
    overflow-y: auto;
  }
  .exercise-list::-webkit-scrollbar { width: 4px; }
  .exercise-list::-webkit-scrollbar-track { background: transparent; }
  .exercise-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .exercise-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .exercise-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.2s;
  }
  .exercise-item:hover::before { transform: scaleY(1); }
  .exercise-item.done {
    opacity: 0.6;
  }
  .exercise-item.done::before {
    background: var(--done);
    transform: scaleY(1);
  }

  .ex-check {
    width: 20px;
    height: 20px;
    border: 1px solid var(--muted);
    border-radius: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 12px;
    color: transparent;
  }
  .exercise-item.done .ex-check {
    background: var(--done);
    border-color: var(--done);
    color: #000;
  }

  .ex-name {
    font-weight: 600;
    font-size: 14px;
    flex: 1;
    min-width: 0;
  }
  .exercise-item.done .ex-name { text-decoration: line-through; color: var(--muted); }

  .ex-meta {
    display: flex;
    gap: 6px;
  }
  .ex-tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--muted);
    white-space: nowrap;
  }

  .ex-delete {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .ex-delete:hover { color: var(--accent2); }

  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }
  .empty-state .empty-icon { font-size: 32px; display: block; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  /* NOTES */
  .notes-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
  }
  .notes-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  textarea.notes-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 12px 14px;
    border-radius: 2px;
    resize: vertical;
    min-height: 70px;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea.notes-input:focus { border-color: var(--accent); }
  textarea.notes-input::placeholder { color: #333; }

  /* MARK DONE BANNER */
  .day-done-banner {
    grid-column: 1 / -1;
    padding: 20px 28px;
    background: linear-gradient(135deg, #001a0e, #002715);
    border: 1px solid var(--done);
    border-radius: 4px;
    display: none;
    align-items: center;
    gap: 16px;
  }
  .day-done-banner.visible { display: flex; }
  .done-icon { font-size: 28px; }
  .done-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: var(--done);
    letter-spacing: 1px;
  }
  .done-sub {
    font-size: 12px;
    color: #00c97a88;
    margin-top: 2px;
  }

  /* STREAK BAR */
  .streak-row {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-bottom: 32px;
    padding: 16px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .streak-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-right: 8px;
    flex-shrink: 0;
  }
  .streak-dot {
    width: 32px;
    height: 32px;
    border-radius: 2px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    transition: all 0.3s;
  }
  .streak-dot.complete {
    background: var(--done);
    border-color: var(--done);
    color: #000;
    font-weight: 700;
  }
  .streak-dot.active-day {
    border-color: var(--accent);
    color: var(--accent);
  }
  .streak-count {
    margin-left: auto;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent);
  }
  .streak-count-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-left: 4px;
    align-self: flex-end;
    margin-bottom: 3px;
  }

  /* DRAG OVER STYLE */
  .video-placeholder.drag-over {
    border-color: var(--accent);
    background: rgba(232, 255, 0, 0.04);
  }

  @media (max-width: 900px) {
    header { padding: 28px 20px 20px; }
    main { padding: 24px 20px; }
    .day-content.active { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">WEEKLY<br><span>GRIND</span></div>
  </div>
  <div class="header-meta">
    <div class="week-label">Weekly Progress</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="weekProgress"></div>
    </div>
    <div class="progress-text" id="weekProgressText">0 / 7 days complete</div>
  </div>
</header>

<main>
  <!-- STREAK ROW -->
  <div class="streak-row" id="streakRow">
    <span class="streak-label">This Week</span>
    <!-- dots injected by JS -->
    <span class="streak-count" id="streakCount">0</span>
    <span class="streak-count-label">streak</span>
  </div>

  <!-- DAY TABS -->
  <div class="day-tabs" id="dayTabs"></div>

  <!-- DAY PANELS -->
  <div id="dayPanels"></div>
</main>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const SHORT = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
const DEFAULT_EXERCISES = [
  [
    { name: 'Push-Ups', sets: 4, reps: 15, weight: '' },
    { name: 'Bench Press', sets: 3, reps: 12, weight: '60kg' },
    { name: 'Tricep Dips', sets: 3, reps: 10, weight: '' },
  ],
  [
    { name: 'Squats', sets: 4, reps: 15, weight: '80kg' },
    { name: 'Lunges', sets: 3, reps: 12, weight: '20kg' },
    { name: 'Leg Press', sets: 3, reps: 10, weight: '100kg' },
  ],
  [
    { name: 'Pull-Ups', sets: 4, reps: 8, weight: '' },
    { name: 'Bent-Over Rows', sets: 3, reps: 12, weight: '50kg' },
    { name: 'Bicep Curls', sets: 3, reps: 15, weight: '15kg' },
  ],
  [
    { name: 'Shoulder Press', sets: 4, reps: 12, weight: '30kg' },
    { name: 'Lateral Raises', sets: 3, reps: 15, weight: '8kg' },
    { name: 'Face Pulls', sets: 3, reps: 15, weight: '20kg' },
  ],
  [
    { name: 'Deadlifts', sets: 4, reps: 6, weight: '100kg' },
    { name: 'Romanian DL', sets: 3, reps: 10, weight: '60kg' },
    { name: 'Glute Bridges', sets: 3, reps: 15, weight: '40kg' },
  ],
  [
    { name: 'Box Jumps', sets: 4, reps: 10, weight: '' },
    { name: 'Burpees', sets: 3, reps: 12, weight: '' },
    { name: 'Mountain Climbers', sets: 3, reps: 20, weight: '' },
  ],
  [
    { name: 'Yoga Flow', sets: 1, reps: 20, weight: 'min' },
    { name: 'Foam Rolling', sets: 1, reps: 10, weight: 'min' },
    { name: 'Stretching', sets: 1, reps: 15, weight: 'min' },
  ],
];

// STATE
let state = JSON.parse(localStorage.getItem('weeklyGrind') || 'null') || {
  activeDay: 0,
  days: DAYS.map((d, i) => ({
    exercises: DEFAULT_EXERCISES[i].map((e,j) => ({ ...e, id: `${i}-${j}`, done: false })),
    videoURL: null,
    videoName: null,
    dayComplete: false,
    notes: '',
  }))
};
// Ensure videoURL handles persistent blobs by clearing on fresh load
// (blobs don't persist across sessions)
state.days.forEach(d => {
  if (d.videoURL && d.videoURL.startsWith('blob:')) {
    d.videoURL = null;
    d.videoName = null;
  }
});

function save() {
  const toSave = JSON.parse(JSON.stringify(state));
  toSave.days.forEach(d => { d.videoURL = null; }); // don't save blobs
  localStorage.setItem('weeklyGrind', JSON.stringify(toSave));
}

function buildUI() {
  buildTabs();
  buildPanels();
  updateProgress();
  updateStreak();
}

function buildTabs() {
  const wrap = document.getElementById('dayTabs');
  wrap.innerHTML = '';
  DAYS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' +
      (i === state.activeDay ? ' active' : '') +
      (state.days[i].dayComplete ? ' completed' : '');
    btn.textContent = d;
    btn.onclick = () => { state.activeDay = i; buildUI(); };
    wrap.appendChild(btn);
  });
}

function buildPanels() {
  const wrap = document.getElementById('dayPanels');
  wrap.innerHTML = '';
  DAYS.forEach((d, i) => {
    const panel = buildDayPanel(i);
    panel.id = `panel-${i}`;
    panel.className = 'day-content' + (i === state.activeDay ? ' active' : '');
    wrap.appendChild(panel);
  });
}

function buildDayPanel(i) {
  const day = state.days[i];
  const panel = document.createElement('div');

  // Done banner
  const banner = document.createElement('div');
  banner.className = 'day-done-banner' + (day.dayComplete ? ' visible' : '');
  banner.innerHTML = `<span class="done-icon">🔥</span><div><div class="done-text">${DAYS[i]} Crushed!</div><div class="done-sub">All exercises completed. Keep the momentum going.</div></div>`;
  panel.appendChild(banner);

  // Video card
  const vCard = document.createElement('div');
  vCard.className = 'video-card';
  vCard.innerHTML = `
    <div class="video-card-header">
      <span class="video-card-title">${DAYS[i]}'s Workout Video</span>
      <span class="video-badge${day.videoURL ? ' has-video' : ''}" id="vbadge-${i}">${day.videoURL ? 'LOADED' : 'NO VIDEO'}</span>
    </div>
    <div class="video-area" id="varea-${i}">
      ${day.videoURL
        ? `<video class="workout-video" id="vid-${i}" src="${day.videoURL}" controls></video>`
        : `<div class="video-placeholder" id="vph-${i}" onclick="triggerUpload(${i})">
            <span class="upload-icon">📹</span>
            <div class="upload-text">Drop or Click to Upload</div>
            <div class="upload-sub">MP4, MOV, AVI supported</div>
          </div>`
      }
    </div>
    <input type="file" id="fileInput-${i}" accept="video/*" onchange="handleVideoUpload(event,${i})">
    <div class="video-controls">
      ${day.videoURL
        ? `<button class="btn" onclick="triggerUpload(${i})">Replace Video</button>
           <button class="btn danger" onclick="removeVideo(${i})">Remove</button>`
        : `<button class="btn primary" onclick="triggerUpload(${i})">Upload Video</button>`
      }
    </div>
  `;
  panel.appendChild(vCard);

  // Exercise card
  const eCard = document.createElement('div');
  eCard.className = 'exercise-card';
  eCard.innerHTML = `
    <div class="exercise-card-header">
      <span class="exercise-card-title">Exercises</span>
      <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)">${day.exercises.filter(e=>e.done).length}/${day.exercises.length} done</span>
    </div>
    <div class="add-exercise-form">
      <input class="input-field input-name" id="exName-${i}" placeholder="Exercise name" type="text">
      <input class="input-field input-sets" id="exSets-${i}" placeholder="Sets" type="number" min="1">
      <input class="input-field input-reps" id="exReps-${i}" placeholder="Reps" type="number" min="1">
      <input class="input-field input-weight" id="exWeight-${i}" placeholder="Weight" type="text">
      <button class="btn primary" onclick="addExercise(${i})" style="flex:none;padding:10px 20px">+ ADD</button>
    </div>
    <div class="exercise-list" id="exList-${i}">
      ${renderExerciseList(i)}
    </div>
    <div class="notes-area">
      <div class="notes-label">Session Notes</div>
      <textarea class="notes-input" placeholder="How did it go? Any PRs? Form cues..." id="notes-${i}" onchange="saveNotes(${i})">${day.notes || ''}</textarea>
    </div>
  `;
  panel.appendChild(eCard);

  // Drag & drop on video placeholder
  setTimeout(() => setupDragDrop(i), 0);

  return panel;
}

function renderExerciseList(i) {
  const day = state.days[i];
  if (!day.exercises.length) {
    return `<div class="empty-state"><span class="empty-icon">💪</span><p>No exercises yet. Add one above.</p></div>`;
  }
  return day.exercises.map((ex, j) => `
    <div class="exercise-item ${ex.done ? 'done' : ''}" id="exitem-${i}-${ex.id}">
      <div class="ex-check" onclick="toggleExercise(${i},'${ex.id}')">${ex.done ? '✓' : ''}</div>
      <div class="ex-name">${escHtml(ex.name)}</div>
      <div class="ex-meta">
        ${ex.sets ? `<span class="ex-tag">${ex.sets} sets</span>` : ''}
        ${ex.reps ? `<span class="ex-tag">${ex.reps} reps</span>` : ''}
        ${ex.weight ? `<span class="ex-tag">${escHtml(ex.weight)}</span>` : ''}
      </div>
      <button class="ex-delete" onclick="deleteExercise(${i},'${ex.id}')" title="Delete">×</button>
    </div>
  `).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleExercise(dayIdx, id) {
  const ex = state.days[dayIdx].exercises.find(e => e.id === id);
  if (ex) ex.done = !ex.done;
  checkDayComplete(dayIdx);
  save();
  refreshExercisePanel(dayIdx);
}

function deleteExercise(dayIdx, id) {
  state.days[dayIdx].exercises = state.days[dayIdx].exercises.filter(e => e.id !== id);
  checkDayComplete(dayIdx);
  save();
  refreshExercisePanel(dayIdx);
}

function addExercise(dayIdx) {
  const name = document.getElementById(`exName-${dayIdx}`).value.trim();
  if (!name) return;
  const sets = document.getElementById(`exSets-${dayIdx}`).value;
  const reps = document.getElementById(`exReps-${dayIdx}`).value;
  const weight = document.getElementById(`exWeight-${dayIdx}`).value.trim();
  const id = `${dayIdx}-${Date.now()}`;
  state.days[dayIdx].exercises.push({ name, sets: sets || '', reps: reps || '', weight, id, done: false });
  document.getElementById(`exName-${dayIdx}`).value = '';
  document.getElementById(`exSets-${dayIdx}`).value = '';
  document.getElementById(`exReps-${dayIdx}`).value = '';
  document.getElementById(`exWeight-${dayIdx}`).value = '';
  save();
  refreshExercisePanel(dayIdx);
}

function refreshExercisePanel(dayIdx) {
  const list = document.getElementById(`exList-${dayIdx}`);
  if (list) list.innerHTML = renderExerciseList(dayIdx);
  const banner = document.querySelector(`#panel-${dayIdx} .day-done-banner`);
  if (banner) {
    banner.classList.toggle('visible', state.days[dayIdx].dayComplete);
  }
  // update counter
  const day = state.days[dayIdx];
  const counter = document.querySelector(`#panel-${dayIdx} .exercise-card-header span:last-child`);
  if (counter) counter.textContent = `${day.exercises.filter(e=>e.done).length}/${day.exercises.length} done`;
  updateProgress();
  updateStreak();
  buildTabs();
}

function checkDayComplete(dayIdx) {
  const day = state.days[dayIdx];
  day.dayComplete = day.exercises.length > 0 && day.exercises.every(e => e.done);
}

function saveNotes(dayIdx) {
  state.days[dayIdx].notes = document.getElementById(`notes-${dayIdx}`).value;
  save();
}

function triggerUpload(i) {
  document.getElementById(`fileInput-${i}`).click();
}

function handleVideoUpload(event, i) {
  const file = event.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  state.days[i].videoURL = url;
  state.days[i].videoName = file.name;
  save();
  buildUI();
}

function removeVideo(i) {
  if (state.days[i].videoURL) URL.revokeObjectURL(state.days[i].videoURL);
  state.days[i].videoURL = null;
  state.days[i].videoName = null;
  save();
  buildUI();
}

function setupDragDrop(i) {
  const ph = document.getElementById(`vph-${i}`);
  if (!ph) return;
  ph.addEventListener('dragover', e => { e.preventDefault(); ph.classList.add('drag-over'); });
  ph.addEventListener('dragleave', () => ph.classList.remove('drag-over'));
  ph.addEventListener('drop', e => {
    e.preventDefault();
    ph.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('video/')) {
      const url = URL.createObjectURL(file);
      state.days[i].videoURL = url;
      state.days[i].videoName = file.name;
      save();
      buildUI();
    }
  });
}

function updateProgress() {
  const done = state.days.filter(d => d.dayComplete).length;
  const pct = (done / 7) * 100;
  document.getElementById('weekProgress').style.width = pct + '%';
  document.getElementById('weekProgressText').textContent = `${done} / 7 days complete`;
}

function updateStreak() {
  const row = document.getElementById('streakRow');
  // Remove existing dots
  Array.from(row.querySelectorAll('.streak-dot')).forEach(d => d.remove());
  const label = row.querySelector('.streak-label');
  let consecutiveStreak = 0;
  let counting = true;
  // Build dots after label
  DAYS.forEach((d, i) => {
    const dot = document.createElement('div');
    dot.className = 'streak-dot' +
      (state.days[i].dayComplete ? ' complete' : '') +
      (i === state.activeDay && !state.days[i].dayComplete ? ' active-day' : '');
    dot.textContent = SHORT[i].slice(0,1);
    label.insertAdjacentElement('afterend', dot);
    if (state.days[i].dayComplete && counting) consecutiveStreak++;
    else counting = false;
  });
  document.getElementById('streakCount').textContent = consecutiveStreak;
}

// ENTER key for adding exercise
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.classList.contains('input-field')) {
    addExercise(state.activeDay);
  }
});

buildUI();
</script>
</body>
</html>
